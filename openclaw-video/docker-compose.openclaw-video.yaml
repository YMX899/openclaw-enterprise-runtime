name: openclaw-video

services:
  openclaw-bridge:
    image: ${OPENCLAW_BRIDGE_IMAGE:-openclaw-video-openclaw-bridge}
    build:
      context: .
      dockerfile: docker/bridge/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    environment:
      DIFY_API_BASE: http://api:5001
      DATABASE_URL: postgresql://bridge:${BRIDGE_POSTGRES_PASSWORD:?}@bridge-postgres:5432/bridge
      BRIDGE_IDENTITY_SECRET: ${BRIDGE_IDENTITY_SECRET:?}
      OPENCLAW_GATEWAY_URL: ws://openclaw-gateway:18789
      OPENCLAW_GATEWAY_TOKEN_FILE: /run/secrets/openclaw_gateway_token
      OPENCLAW_GATEWAY_DEVICE_KEY_FILE: /run/secrets/openclaw_bridge_device_key.pem
      KNOWLEDGE_BASE_DIR: /knowledge/short-video
      KNOWLEDGE_BASE_VERSION_FILE: /knowledge/short-video/VERSION
      BRIDGE_ENABLE_TEST_IDENTITY_HEADERS: ${BRIDGE_ENABLE_TEST_IDENTITY_HEADERS:-0}
      BRIDGE_TEST_IDENTITY_SECRET: ${BRIDGE_TEST_IDENTITY_SECRET:-}
    ports:
      - "127.0.0.1:18181:3000"
    volumes:
      - ../artifacts/knowledge-base-short-video/2026.06.06:/knowledge/short-video:ro
      - ./secrets/openclaw_gateway_token:/run/secrets/openclaw_gateway_token:ro
      - ./secrets/openclaw_bridge_device_key.pem:/run/secrets/openclaw_bridge_device_key.pem:ro
    networks:
      - openclaw-internal
      - dify-default
    depends_on:
      bridge-postgres:
        condition: service_healthy
      openclaw-gateway:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true

  bridge-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bridge
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: ${BRIDGE_POSTGRES_PASSWORD:?}
    volumes:
      - bridge-postgres-data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - openclaw-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge -d bridge"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports: []
    security_opt:
      - no-new-privileges:true

  openclaw-gateway:
    build:
      context: .
      dockerfile: docker/openclaw-gateway/Dockerfile
      args:
        OPENCLAW_VERSION: "2026.3.13"
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:22.18-slim}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-http://deb.debian.org/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://deb.debian.org/debian-security}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
    volumes:
      - ./secrets/openclaw_gateway_token:/run/secrets/openclaw_gateway_token:ro
      - openclaw-gateway-state:/var/lib/openclaw
      - ./openclaw/config:/etc/openclaw:ro
      - ../artifacts/knowledge-base-short-video/2026.06.06:/knowledge/short-video:ro
    networks:
      - openclaw-internal
    expose:
      - "18789"
    ports: []
    security_opt:
      - no-new-privileges:true
    pids_limit: 128

  video-analysis-worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    environment:
      DATABASE_URL: postgresql://bridge:${BRIDGE_POSTGRES_PASSWORD:?}@bridge-postgres:5432/bridge
      DOUYIN_CHONG_BIN: /usr/local/bin/openclaw-douyin-adapter
      DOUYIN_CHONG_ENV_FILE: /run/secrets/douyin_chong_env
      DOUYIN_CHONG_PYTHONPATH: /app/vendor
      WORKER_CONCURRENCY: "1"
      JOB_TIMEOUT_SECONDS: "900"
      MAX_DOWNLOAD_BYTES: "536870912"
      MAX_VIDEO_DURATION_SECONDS: "60"
      MAX_VIDEO_FRAMES: "1200"
    volumes:
      - ./vendor/douyin_chong:/app/vendor/douyin_chong:ro
      - ./secrets/douyin_chong.env:/run/secrets/douyin_chong_env:ro
      - worker-tmp:/tmp/openclaw-video
    read_only: true
    tmpfs:
      - /tmp:size=1024m,nosuid,nodev
    networks:
      - openclaw-internal
    depends_on:
      bridge-postgres:
        condition: service_healthy
    cpus: "1.00"
    mem_limit: 1024M
    mem_reservation: 256M
    security_opt:
      - no-new-privileges:true
    pids_limit: 128

volumes:
  bridge-postgres-data:
  openclaw-gateway-state:
  worker-tmp:

networks:
  openclaw-internal:
    name: openclaw_video_internal
  dify-default:
    external: true
    name: ${DIFY_DOCKER_NETWORK:-docker_default}

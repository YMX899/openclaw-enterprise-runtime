    - data:
        code: "import re\n\ndef main(arg1=None, **kwargs):\n    # 1) 取入参文本\n    text\
          \ = (arg1 or \"\").strip()\n    if not text:\n        return {\"result\"\
          : \"未收到需要解析的文本。\"}\n\n    # 2) 标题锚点（七维度）\n    anchors = [\n        (\"典型用户\"\
          , r\"(?:###\\s*)?1[\\.、]\\s*典型用户\"),\n        (\"价值\",     r\"(?:###\\s*)?2[\\\
          .、]\\s*价值\"),\n        (\"人设\",     r\"(?:###\\s*)?3[\\.、]\\s*人设\"),\n \
          \       (\"类型\",     r\"(?:###\\s*)?4[\\.、]\\s*类型\"),\n        (\"风格\",\
          \     r\"(?:###\\s*)?5[\\.、]\\s*风格\"),\n        (\"变现路径\", r\"(?:###\\s*)?6[\\\
          .、]\\s*变现路径\"),\n        (\"行动建议\", r\"(?:###\\s*)?7[\\.、]\\s*行动建议\"),\n\
          \    ]\n\n    # 3) 定位各段\n    idx_map = []\n    for key, pat in anchors:\n\
          \        m = re.search(pat, text)\n        if m:\n            idx_map.append((key,\
          \ m.start(), m.end()))\n\n    if not idx_map:\n        # 仍然要返回 result，否则节点会报错\n\
          \        return {\"result\": \"未匹配到七维度标题。\\n\\n原文：\\n\" + text}\n\n    idx_map.sort(key=lambda\
          \ x: x[1])\n\n    sections = {}\n    for i, (key, start, end) in enumerate(idx_map):\n\
          \        nxt_start = idx_map[i+1][1] if i+1 < len(idx_map) else len(text)\n\
          \        sections[key] = text[end:nxt_start].strip()\n\n    # 4) 组装为中文纯文本\n\
          \    order = [\"典型用户\",\"价值\",\"人设\",\"类型\",\"风格\",\"变现路径\",\"行动建议\"]\n\
          \    parts = []\n    for k in order:\n        if sections.get(k):\n    \
          \        parts.append(f\"【{k}】\\n{sections[k]}\")\n\n    result_text = \"\
          \\n\\n\".join(parts) if parts else \"未抽取到正文内容。\"\n    return {\"result\"\
          : result_text}\n"

        answer: '账号定位，一开始往往是模糊的。它不是坐在那儿就能想出来，而是在一条条内容中被创作出来的。定位从来不是想清楚了再做，而是在做的过程中逐渐清晰。深度账号定位的每一个步骤不可以跳过，认真回答



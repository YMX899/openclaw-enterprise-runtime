          \ JSON / dict / 纯文本\"\"\"\n    if isinstance(payload, dict):\n        return\
          \ str(payload.get(\"text\", \"\"))\n    s = \"\" if payload is None else\
          \ str(payload)\n    try:\n        obj = json.loads(s)\n        return str(obj.get(\"\
          text\", s))\n    except Exception:\n        return s\n\ndef main(arg1: str,\
          \ arg2: str = \"\") -> dict:\n    full_text = _as_text(arg1).replace(\"\\\
          r\\n\", \"\\n\")\n\n    # 提取 \"### 1. 典型用户\" 开始，到下一个 ### 或 --- 或文本结尾为止\n\
          \    pattern = r\"(###\\s*1\\.\\s*典型用户.*?)(?=\\n###|\\n---|\\Z)\"\n    m\
          \ = re.search(pattern, full_text, flags=re.S)\n\n    content = m.group(1).strip()\
          \ if m else \"\"\n\n    return {\"result\": content}\n"
